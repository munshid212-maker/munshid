<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Munshid</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    .bg-shapes {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
      z-index: 0;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      animation: float 8s ease-in-out infinite;
    }

    .shape:nth-child(1) {
      width: 300px;
      height: 300px;
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .shape:nth-child(2) {
      width: 200px;
      height: 200px;
      top: 50%;
      right: -50px;
      animation-delay: 1s;
    }

    .shape:nth-child(3) {
      width: 150px;
      height: 150px;
      bottom: -50px;
      left: 30%;
      animation-delay: 2s;
    }

    .shape:nth-child(4) {
      width: 100px;
      height: 100px;
      top: 20%;
      left: 60%;
      animation-delay: 0.5s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-30px) rotate(180deg);
      }
    }

    /* Login container */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 450px;
      padding: 2rem;
    }

    /* Logo */
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeInDown 0.6s ease;
    }

    .login-logo h1 {
      color: white;
      font-size: 2.5rem;
      font-weight: 700;
      text-shadow: 0 2px 20px rgba(0,0,0,0.2);
    }

    .login-logo p {
      color: rgba(255,255,255,0.8);
      margin-top: 0.5rem;
    }

    /* Login card */
    .login-card {
      background: white;
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      animation: slideUp 0.8s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h2 {
      font-size: 1.75rem;
      color: #333;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: #888;
      font-size: 0.9rem;
    }

    /* Form */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.125rem;
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }

    .form-group input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .form-group input:focus + .input-icon,
    .form-group input:focus ~ .input-icon {
      opacity: 1;
    }

    /* Password toggle */
    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.125rem;
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }

    .password-toggle:hover {
      opacity: 1;
    }

    /* Options row */
    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.875rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #555;
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      cursor: pointer;
    }

    .forgot-password {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .forgot-password:hover {
      color: #764ba2;
    }

    /* Login button */
    .login-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .login-btn:hover::before {
      left: 100%;
    }

    .login-btn:active {
      transform: translateY(0);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8e8e8;
    }

    .divider span {
      color: #888;
      font-size: 0.875rem;
    }

    /* Social login */
    .social-login {
      display: flex;
      gap: 1rem;
    }

    .social-btn {
      flex: 1;
      padding: 0.875rem;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      font-size: 1.25rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .social-btn span {
      font-size: 0.875rem;
      font-weight: 500;
      color: #555;
    }

    .social-btn:hover {
      border-color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* Sign up link */
    .signup-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #888;
      font-size: 0.9rem;
    }

    .signup-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    /* Error message */
    .error-message {
      background: #fee;
      border: 1px solid #fcc;
      color: #c33;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
      animation: shake 0.5s ease;
    }

    .error-message.show {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }

    /* Success state */
    .login-card.success {
      text-align: center;
      padding: 3rem;
    }

    .success-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: bounce 0.6s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .success-icon .emoji {
      font-size: 5rem;
    }

    .login-card.success h2 {
      color: #333;
      margin-bottom: 0.5rem;
    }

    .login-card.success p {
      color: #888;
      margin-bottom: 1.5rem;
    }

    .back-btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 2rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.875rem;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .login-footer a {
      color: white;
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .login-wrapper {
        padding: 1rem;
      }

      .login-card {
        padding: 1.5rem;
      }

      .social-login {
        flex-direction: column;
      }

      .options-row {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <!-- Background shapes -->
  <div class="bg-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="login-wrapper">
    <!-- Logo -->
    <div class="login-logo">
      <h1>Munshid</h1>
      <p>Welcome back! Please login to your account.</p>
    </div>

    <!-- Login Card -->
    <div class="login-card" id="loginCard">
      <div class="login-header">
        <h2>Sign In</h2>
        <p>Enter your credentials to access your account</p>
      </div>

      <!-- Error Message -->
      <div class="error-message" id="errorMessage">
        <span>❌</span>
        <span id="errorText">Invalid email or password. Please try again.</span>
      </div>

      <!-- Login Form -->
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="email" name="email" placeholder="munshid.212@gmail.com" required>
            <span class="input-icon">👤</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <span class="input-icon">🔒</span>
            <button type="button" class="password-toggle" onclick="togglePassword()">👁️</button>
          </div>
        </div>

        <div class="options-row">
          <label class="remember-me">
            <input type="checkbox" id="remember" name="remember">
            Remember me
          </label>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          Sign In
        </button>

        <div class="divider">
          <span>or continue with</span>
        </div>

        <div class="social-login">
          <button type="button" class="social-btn" onclick="socialLogin('google')">
            <span>🔵</span>
            <span>Google</span>
          </button>
          <button type="button" class="social-btn" onclick="socialLogin('github')">
            <span>⚫</span>
            <span>GitHub</span>
          </button>
        </div>

        <div class="signup-link">
          Don't have an account? <a href="#">Sign up</a>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const loginCard = document.getElementById('loginCard');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const loginBtn = document.getElementById('loginBtn');
    const passwordInput = document.getElementById('password');

    // Toggle password visibility
    function togglePassword() {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
    }

    // Show error
    function showError(message) {
      errorText.textContent = message;
      errorMessage.classList.add('show');
      passwordInput.value = '';
      passwordInput.focus();
    }

    // Hide error
    function hideError() {
      errorMessage.classList.remove('show');
    }

    // Social login placeholder
    function socialLogin(provider) {
      alert(`${provider.charAt(0).toUpperCase() + provider.slice(1)} login coming soon! This is a demo.`);
    }

    // Handle form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Show loading state
      loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';
      loginBtn.disabled = true;

      // Simulate API call delay
      await new Promise(resolve => setTimeout(resolve, 1500));

      // Demo credentials - same password as gallery
      const validEmail = 'munshid.212@gmail.com';
      const validPassword = '16092025';

      if (email === validEmail && password === validPassword) {
        // Success!
        loginCard.innerHTML = `
          <div class="success-icon">
            <span class="emoji">🎉</span>
          </div>
          <h2>Welcome Back!</h2>
          <p>You have successfully logged in.</p>
          <a href="index.html" class="back-btn">Go to Homepage</a>
        `;
        loginCard.classList.add('success');
      } else {
        // Error
        showError('Invalid email or password. Please try again.');
        loginBtn.innerHTML = 'Sign In';
        loginBtn.disabled = false;
      }
    });

    // Clear error on input
    document.getElementById('email').addEventListener('input', hideError);
    passwordInput.addEventListener('input', hideError);
  </script>
</body>
</html>
