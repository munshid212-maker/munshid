<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Personal Website</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      min-height: calc(100vh - var(--nav-height));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-2xl);
    }
    .login-box {
      background: var(--bg-secondary);
      padding: var(--spacing-2xl);
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border);
    }
    .login-box h2 {
      font-size: var(--font-size-2xl);
      margin-bottom: var(--spacing-lg);
      text-align: center;
      color: var(--text-primary);
    }
    .login-box .form-group {
      margin-bottom: var(--spacing-md);
    }
    .login-box input {
      width: 100%;
    }
    .login-box .btn {
      width: 100%;
      margin-top: var(--spacing-md);
    }
    .login-box p {
      text-align: center;
      margin-top: var(--spacing-lg);
      color: var(--text-secondary);
    }
    .login-box a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">Munshid</a>
    <div class="nav-toggle" onclick="this.classList.toggle('active'); document.querySelector('.nav-links').classList.toggle('active')">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html" class="btn btn-primary" style="padding: 0.5rem 1.25rem; border-radius: 8px;">Login</a></li>
    </ul>
  </nav>

  <!-- Login Form -->
  <main class="main">
    <div class="login-container">
      <div class="login-box">
        <h2>Login</h2>
        <form action="#" method="POST">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p>Don't have an account? <a href="#">Sign up</a></p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer-text">&copy; 2026 Munshid. All rights reserved.</p>
    <div class="footer-links">
      <a href="https://github.com" target="_blank">GitHub</a>
      <a href="https://linkedin.com" target="_blank">LinkedIn</a>
      <a href="https://twitter.com" target="_blank">Twitter</a>
    </div>
  </footer>

  </body>
</html>
